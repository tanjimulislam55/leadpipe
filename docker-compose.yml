# One-command stack: docker compose up
#
# Services:
#   ollama     — local LLM serving (qwen2.5:7b + nomic-embed-text pulled on first start)
#   dashboard  — Streamlit UI on http://localhost:8501
#   pipeline   — generates 100k leads (if absent) and replays them through the doctor
#
# First start downloads ~5GB of model weights into the ollama volume; subsequent
# starts are instant. All tools are free & open source; no keys, no paid APIs.

services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 30

  model-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "ollama pull qwen2.5:7b && ollama pull nomic-embed-text"

  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data

  pipeline:
    build: .
    depends_on:
      model-init:
        condition: service_completed_successfully
    environment:
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - ./data:/app/data
    command: >
      sh -c "test -f data/generated/facebook_leads.jsonl || python generate_data.py;
             python run_pipeline.py --pace 1 && python dedupe.py"

volumes:
  ollama_models:
